name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/saas/package-lock.json

      - name: Install dependencies
        working-directory: apps/saas
        run: npm ci

      - name: Type check
        working-directory: apps/saas
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/saas/package-lock.json

      - name: Install dependencies
        working-directory: apps/saas
        run: npm ci

      - name: Lint
        working-directory: apps/saas
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/saas/package-lock.json

      - name: Install dependencies
        working-directory: apps/saas
        run: npm ci

      - name: Run tests
        working-directory: apps/saas
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/saas/package-lock.json

      - name: Install dependencies
        working-directory: apps/saas
        run: npm ci

      - name: Build
        working-directory: apps/saas
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://app.zaki.dz
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
